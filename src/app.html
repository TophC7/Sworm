<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sworm</title>
    <script>
      ;(() => {
        let overlay
        let detailPre
        let copyButton

        // FIXME: This global runtime error overlay is intentionally loud for
        // local development. Remove it for release builds or gate it behind a
        // dev-only flag before shipping.
        const ensureOverlay = () => {
          if (overlay instanceof HTMLDivElement && detailPre instanceof HTMLPreElement) {
            overlay.hidden = false
            return { overlay, detailPre, copyButton }
          }

          overlay = document.createElement('div')
          overlay.id = 'sworm-startup-error'
          overlay.setAttribute('role', 'dialog')
          overlay.setAttribute('aria-live', 'assertive')
          overlay.setAttribute('aria-label', 'Runtime error')
          overlay.style.position = 'fixed'
          overlay.style.inset = '16px'
          overlay.style.zIndex = '999999'
          overlay.style.display = 'flex'
          overlay.style.flexDirection = 'column'
          overlay.style.gap = '12px'
          overlay.style.padding = '18px'
          overlay.style.boxSizing = 'border-box'
          overlay.style.border = '1px solid rgba(255, 118, 114, 0.55)'
          overlay.style.borderRadius = '12px'
          overlay.style.background = 'rgba(26, 21, 19, 0.98)'
          overlay.style.boxShadow = '0 16px 48px rgba(0, 0, 0, 0.5)'
          overlay.style.color = '#fff3ef'

          const header = document.createElement('div')
          header.style.display = 'flex'
          header.style.flexWrap = 'wrap'
          header.style.alignItems = 'center'
          header.style.justifyContent = 'space-between'
          header.style.gap = '12px'

          const titleGroup = document.createElement('div')
          titleGroup.style.display = 'flex'
          titleGroup.style.flexDirection = 'column'
          titleGroup.style.gap = '8px'
          titleGroup.style.minWidth = '0'

          const title = document.createElement('div')
          title.textContent = 'Runtime Error Overlay'
          title.style.font = '700 16px/1.2 Lexend, sans-serif'
          title.style.color = '#fff3ef'

          const fixme = document.createElement('div')
          fixme.textContent = 'FIXME: remove for release or gate behind dev'
          fixme.style.display = 'inline-flex'
          fixme.style.alignItems = 'center'
          fixme.style.width = 'fit-content'
          fixme.style.padding = '4px 8px'
          fixme.style.border = '1px solid rgba(255, 229, 114, 0.45)'
          fixme.style.borderRadius = '999px'
          fixme.style.background = 'rgba(255, 229, 114, 0.12)'
          fixme.style.color = '#ffeea5'
          fixme.style.font = '600 11px/1.2 Lexend, sans-serif'
          fixme.style.letterSpacing = '0.08em'
          fixme.style.textTransform = 'uppercase'

          titleGroup.append(title, fixme)

          const actions = document.createElement('div')
          actions.style.display = 'flex'
          actions.style.flexWrap = 'wrap'
          actions.style.gap = '8px'
          actions.style.alignItems = 'center'

          const makeButton = (label, options = {}) => {
            const button = document.createElement('button')
            button.type = 'button'
            button.textContent = label
            button.style.appearance = 'none'
            button.style.border = options.border || '1px solid rgba(58, 50, 46, 1)'
            button.style.borderRadius = '8px'
            button.style.background = options.background || 'rgba(47, 41, 38, 1)'
            button.style.color = options.color || '#e2e2e2'
            button.style.padding = '8px 12px'
            button.style.font = '500 12px/1.2 Lexend, sans-serif'
            button.style.cursor = 'pointer'
            button.style.transition = 'filter 120ms ease'
            button.onmouseenter = () => {
              button.style.filter = 'brightness(1.08)'
            }
            button.onmouseleave = () => {
              button.style.filter = ''
            }
            return button
          }

          copyButton = makeButton('Copy error', {
            border: '1px solid rgba(255, 181, 159, 0.35)',
            background: 'rgba(255, 181, 159, 0.14)',
            color: '#ffddd3'
          })
          copyButton.onclick = async () => {
            const text = detailPre instanceof HTMLPreElement ? detailPre.textContent || '' : ''
            if (!text) return

            let copied = false
            try {
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text)
                copied = true
              }
            } catch {}

            if (!copied) {
              const selection = window.getSelection()
              const range = document.createRange()
              range.selectNodeContents(detailPre)
              selection?.removeAllRanges()
              selection?.addRange(range)
              copied = document.execCommand('copy')
              selection?.removeAllRanges()
            }

            copyButton.textContent = copied ? 'Copied' : 'Copy failed'
            window.setTimeout(() => {
              if (copyButton) copyButton.textContent = 'Copy error'
            }, 1500)
          }

          const dismissButton = makeButton('Dismiss')
          dismissButton.onclick = () => {
            if (overlay) overlay.hidden = true
          }

          actions.append(copyButton, dismissButton)
          header.append(titleGroup, actions)

          detailPre = document.createElement('pre')
          detailPre.style.margin = '0'
          detailPre.style.flex = '1'
          detailPre.style.minHeight = '0'
          detailPre.style.overflow = 'auto'
          detailPre.style.padding = '14px'
          detailPre.style.whiteSpace = 'pre-wrap'
          detailPre.style.font = '12px/1.5 monospace'
          detailPre.style.color = '#fff3ef'
          detailPre.style.background = 'rgba(54, 19, 19, 0.92)'
          detailPre.style.border = '1px solid rgba(255, 118, 114, 0.35)'
          detailPre.style.borderRadius = '8px'

          overlay.append(header, detailPre)

          const mount = () => {
            if (!document.body || !overlay) return
            if (!overlay.isConnected) document.body.appendChild(overlay)
          }

          if (document.body) {
            mount()
          } else {
            document.addEventListener('DOMContentLoaded', mount, { once: true })
          }

          return { overlay, detailPre, copyButton }
        }

        const render = (label, detail) => {
          console.error(`[sworm] ${label}`, detail)
          window.__SWORM_LAST_CLIENT_ERROR__ = { label, ...detail }

          const { detailPre, copyButton } = ensureOverlay()

          const lines = [
            `${label}`,
            '',
            detail.message || '',
            detail.filename ? `file: ${detail.filename}:${detail.lineno || 0}:${detail.colno || 0}` : '',
            detail.stack || '',
            detail.reasonStack || '',
            detail.reasonText || ''
          ].filter(Boolean)

          detailPre.textContent = lines.join('\n')
          if (copyButton) copyButton.textContent = 'Copy error'
        }

        // Benign spec-mandated warnings browsers fire during ResizeObserver
        // callbacks that change geometry the same observer watches. Monaco's
        // layout() legitimately does this; filtering keeps the error overlay
        // clean while real errors still surface.
        //
        // The root-cause fix lives in MonacoDiffBody and DiffStack, which
        // RAF-coalesce their ResizeObserver callbacks so layout() runs
        // AFTER the observer returns. This filter is defense in depth for
        // any future observer we miss.
        const BENIGN_MESSAGE_PATTERNS = [
          /^ResizeObserver loop/i,
          /^ResizeObserver loop completed with undelivered notifications/i,
          // Monaco DiffEditor: the diff-worker promise rejects when the
          // editor swaps or disposes its model mid-compute. Happens during
          // normal pool churn (scroll in/out fast, collapse-all, teardown).
          // Internal to Monaco — no API to catch it at the call site.
          /^no diff result available/i
        ]
        const isBenign = (msg) => typeof msg === 'string' && BENIGN_MESSAGE_PATTERNS.some((re) => re.test(msg))

        window.addEventListener('error', (event) => {
          if (isBenign(event.message)) return
          render('window error', {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
            stack: event.error && event.error.stack ? String(event.error.stack) : ''
          })
        })

        window.addEventListener('unhandledrejection', (event) => {
          const reason = event.reason
          const message = reason && reason.message ? String(reason.message) : typeof reason === 'string' ? reason : ''
          if (isBenign(message)) {
            event.preventDefault()
            return
          }
          render('unhandled rejection', {
            message: message || 'Unhandled promise rejection',
            reasonText: typeof reason === 'string' ? reason : '',
            reasonStack: reason && reason.stack ? String(reason.stack) : ''
          })
        })
      })()
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
